<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ScreenParty · 登录</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- 登录界面(独立页面;无自助注册入口) -->
<section id="login" class="lobby" hidden>
  <div class="lobby-card">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>ScreenParty</h1>
      <p class="brand-sub">请使用账号登录</p>
    </div>
    <label for="loginUser">用户名</label>
    <input id="loginUser" maxlength="32" placeholder="账号" autocomplete="username" />
    <label for="loginPass">密码</label>
    <input id="loginPass" type="password" maxlength="128" placeholder="密码" autocomplete="current-password" />
    <button id="loginBtn" class="btn-primary">登录</button>
    <p id="loginError" class="lobby-error" hidden></p>
    <p class="lobby-hint">账号由管理员分配,不支持自助注册。</p>
  </div>
</section>

<script src="/login.js"></script>
</body>
</html>
