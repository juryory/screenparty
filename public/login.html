<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ScreenParty · 登录</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- 登录 / 注册(同一张卡片切换) -->
<section id="login" class="lobby" hidden>
  <div class="lobby-card">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>ScreenParty</h1>
      <p class="brand-sub" id="brandSub">请使用账号登录</p>
    </div>
    <label for="loginUser">用户名</label>
    <input id="loginUser" maxlength="32" placeholder="账号" autocomplete="username" />
    <label for="loginNick" id="nickLabel" hidden>显示昵称</label>
    <input id="loginNick" maxlength="24" placeholder="频道里显示的名字" autocomplete="nickname" hidden />
    <label for="loginPass">密码</label>
    <input id="loginPass" type="password" maxlength="128" placeholder="密码" autocomplete="current-password" />
    <button id="loginBtn" class="btn-primary">登录</button>
    <p id="loginError" class="lobby-error" hidden></p>
    <p class="lobby-hint" id="regHint" hidden>注册后即可共享屏幕、开麦、开摄像头,画质不受限。</p>
    <div class="lobby-actions">
      <button id="modeToggle" class="btn-secondary" type="button">注册新账号</button>
      <button id="guestBtn" class="btn-ghost" type="button">游客进入</button>
    </div>
    <p class="lobby-note" id="guestNote">游客免注册,可看可共享,仅画质受限;进入后可随时注册升级为正式账号。</p>
  </div>
</section>

<script src="/login.js"></script>
</body>
</html>
