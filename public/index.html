<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ScreenParty · 开黑同屏</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- 未登录会被 app.js 跳转到 /login.html -->
<div id="app" class="app" hidden>

  <!-- 第一栏:服务器头 + 频道列表 + 底部用户面板 -->
  <section class="channels">
    <header class="guild-head">
      <div class="server-badge" id="serverBadge" title="服务器">🎮</div>
      <span class="guild-name" id="guildName">ScreenParty</span>
      <button id="guildMenuBtn" class="guild-menu-btn" title="服务器管理" hidden>⌄</button>
    </header>
    <div class="channel-scroll" id="channelList"></div>
    <footer class="channels-foot">
      <div class="userbar">
        <div class="userbar-id">
          <span class="avatar" id="uAvatar"></span>
          <span class="userbar-text">
            <span class="userbar-nick" id="uNick"></span>
            <span class="userbar-role" id="uRole"></span>
          </span>
        </div>
        <div class="userbar-actions">
          <button id="micToggle" class="icon-btn" aria-pressed="true" title="麦克风">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
          </button>
          <button id="settingsBtn" class="icon-btn" title="设置" aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm8.94 4a7.5 7.5 0 0 0-.1-1.2l2-1.56-2-3.46-2.36.95a7.4 7.4 0 0 0-2.08-1.2L15.9 2h-4l-.4 2.53a7.4 7.4 0 0 0-2.08 1.2L7.06 4.8l-2 3.46 2 1.56a7.6 7.6 0 0 0 0 2.4l-2 1.56 2 3.46 2.36-.95c.62.5 1.32.9 2.08 1.2L12 22h4l.4-2.53a7.4 7.4 0 0 0 2.08-1.2l2.36.95 2-3.46-2-1.56c.06-.4.1-.8.1-1.2Z"/></svg>
          </button>
        </div>
        <div id="userMenu" class="user-menu" hidden>
          <a id="adminLink" class="menu-item" href="/admin.html" hidden>用户管理</a>
          <button id="logoutBtn" class="menu-item">退出登录</button>
        </div>
      </div>
    </footer>
  </section>

  <!-- 第二栏:主区 -->
  <main class="stage-col">
    <header class="topbar" id="channelBar" hidden>
      <span class="ch-ico" aria-hidden="true">🔊</span>
      <span class="ch-name" id="curChannel"></span>
      <span class="ch-topic" id="curTopic"></span>
      <div class="bar-fill"></div>
      <button id="shareBtn" class="ctl ctl-share" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-6v2h3v2H7v-2h3v-2H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm1 2v8h14V7H5Z"/></svg>
        <span>共享屏幕</span>
      </button>
      <button id="leaveBtn" class="ctl ctl-leave">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M10 4h9a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-9v-2h8V6h-8V4Zm-1.5 4.5L4 12l4.5 3.5v-2.5H14v-2H8.5V8.5Z"/></svg>
        <span>离开频道</span>
      </button>
    </header>

    <div class="stage-wrap">
      <div id="stage" class="stage">
        <div id="emptyState" class="empty">
          <p id="emptyMain">← 选一个语音频道开始开黑</p>
          <p class="empty-sub">进频道后点「共享屏幕」把画面播给大家;右侧点缩略图切换主画面</p>
        </div>
      </div>
      <aside id="rail" aria-label="其他画面"></aside>
    </div>
  </main>

  <!-- 通用弹窗 -->
  <div id="modal" class="modal-overlay" hidden>
    <div class="modal">
      <header class="modal-head">
        <span id="modalTitle"></span>
        <button id="modalClose" class="icon-btn" title="关闭">✕</button>
      </header>
      <div id="modalBody" class="modal-body"></div>
      <footer class="modal-foot">
        <button id="modalCancel" class="btn-ghost">取消</button>
        <button id="modalOk" class="btn-primary">确定</button>
      </footer>
    </div>
  </div>

  <!-- 右键 / 操作菜单 -->
  <div id="ctxMenu" class="ctx-menu" hidden></div>
</div>

<template id="tileTemplate">
  <figure class="tile">
    <video playsinline autoplay></video>
    <div class="tile-stats" aria-hidden="true"></div>
    <figcaption class="umd">
      <span class="umd-name"></span>
      <span class="umd-tally">ON AIR</span>
    </figcaption>
  </figure>
</template>

<script src="/app.js"></script>
</body>
</html>
